name: Daily data update

on:
  schedule:
    # 매일 한국시간(KST) 오전 4시 = UTC 전날 19시
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      debug_raw:
        description: "원본 API 응답을 로그로 출력할지 여부 (1 = 켜기)"
        required: false
        default: "0"
      target_date:
        description: "수동으로 특정 날짜를 지정하고 싶을 때 (YYYYMMDD), 비워두면 어제 날짜"
        required: false
        default: ""

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run data update script
        env:
          GARAK_API_KEY: ${{ secrets.GARAK_API_KEY }}
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          DEBUG_RAW: ${{ github.event.inputs.debug_raw || '0' }}
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/update_data.py ${{ github.event.inputs.target_date }}
          else
            python scripts/update_data.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "data-bot"
          git config user.email "data-bot@users.noreply.github.com"
          git add data/garak_data.json data/climate_data.json
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
            git push
          fi
